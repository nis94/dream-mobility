run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

issues:
  exclude-dirs:
    - proto
  exclude-rules:
    - path: _test\.go
      linters:
        - unparam
