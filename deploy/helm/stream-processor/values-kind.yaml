# values-kind.yaml — overrides for running stream-processor in kind against
# docker-compose Postgres + Kafka on the host. See
# deploy/helm/ingest-api/values-kind.yaml for the host.docker.internal +
# PLAINTEXT_KIND listener rationale.

# replicaCount inherits 1 from values.yaml. The topic has 3 partitions, so
# one pod consumes all three sequentially (per-entity ordering is still
# preserved — Murmur2 keyed partitions, one consumer per partition, here
# same consumer across all three). Raise to 3 when throughput warrants it.

image:
  pullPolicy: Never

env:
  PROM_PORT: "9466"
  KAFKA_BROKERS: "host.docker.internal:39092"
  KAFKA_TOPIC: "movement.events"
  KAFKA_GROUP_ID: "mobility-postgres"
  POSTGRES_DSN: "postgres://postgres:postgres@host.docker.internal:5432/mobility?sslmode=disable"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4318"
