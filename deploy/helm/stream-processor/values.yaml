replicaCount: 1

image:
  repository: dream-flight/stream-processor
  tag: ""          # defaults to Chart.AppVersion
  pullPolicy: IfNotPresent

metricsPort: 9466

env:
  PROM_PORT: "9466"
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_TOPIC: "flight.telemetry"
  KAFKA_GROUP_ID: "flight-postgres"
  # DEV-ONLY dsn. In production set postgresSecret below and leave
  # POSTGRES_DSN unset so the chart reads from the Secret.
  POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/flight?sslmode=disable"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  LOG_LEVEL: "INFO"

# postgresSecret:
#   name: df-postgres-dsn
#   key: dsn

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"
