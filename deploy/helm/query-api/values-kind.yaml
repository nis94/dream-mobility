# values-kind.yaml — query-api override for kind cluster.

image:
  pullPolicy: Never

service:
  # ClusterIP not NodePort: the read API isn't exposed to the host by
  # kind's extraPortMappings (only ingest-api 8080 and ArgoCD 8443 are).
  # An allocated-but-unreachable NodePort is worse than a ClusterIP; when
  # you need to query from the host, use:
  #   kubectl port-forward svc/dm-query-api-query-api 8090:8090
  type: ClusterIP
  port: 8090
  targetPort: 8090

env:
  QUERY_HTTP_PORT: "8090"
  PROM_PORT: "9465"
  POSTGRES_DSN: "postgres://postgres:postgres@host.docker.internal:5432/mobility?sslmode=disable"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4318"
