replicaCount: 1

image:
  repository: dream-mobility/ingest-api
  # tag defaults to Chart.AppVersion when unset — keeps image + chart in lockstep.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

containerPort: 8080
metricsPort: 9464

env:
  HTTP_PORT: "8080"
  PROM_PORT: "9464"
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_TOPIC: "movement.events"
  SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  # INFO is the production default. Override to DEBUG in values-kind.yaml
  # or via kubectl set env to see per-request detail.
  LOG_LEVEL: "INFO"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
