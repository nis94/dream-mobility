replicaCount: 1

image:
  repository: dream-flight/clickhouse-sink
  tag: ""          # defaults to Chart.AppVersion
  pullPolicy: IfNotPresent

metricsPort: 9467

env:
  PROM_PORT: "9467"
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_TOPIC: "flight.telemetry"
  KAFKA_GROUP_ID: "flight-clickhouse"
  CLICKHOUSE_ADDR: "clickhouse:9000"
  CLICKHOUSE_DB: "flight"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  LOG_LEVEL: "INFO"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"
