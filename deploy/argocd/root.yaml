# Root "app-of-apps" — the only Application you apply by hand. Everything
# else (the 4 services) is a child Application committed under
# deploy/argocd/apps/ that this root syncs.
#
# Usage:
#   kubectl apply -f deploy/argocd/root.yaml
#
# ArgoCD will then discover, create, and sync every *.yaml under
# deploy/argocd/apps/ automatically. Subsequent changes (new service, new
# values override) are propagated by pushing to main — no manual apply.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dm-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nis94/dream-mobility.git
    targetRevision: main
    path: deploy/argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
