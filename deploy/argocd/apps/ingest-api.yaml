apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dm-ingest-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nis94/dream-mobility.git
    targetRevision: main
    path: deploy/helm/ingest-api
    helm:
      releaseName: dm-ingest-api
      valueFiles:
        - values.yaml
        - values-kind.yaml
      parameters:
        - name: image.tag
          value: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
