# kind cluster spec for the Dream Mobility dev loop.
#
# Single-node cluster. Two host ports are forwarded into the node:
#   8080  → NodePort 30080 (ingest-api)   — for host-side generator / curl
#   8443  → NodePort 30443 (argocd UI)    — ArgoCD server over TLS
#
# Infra (Kafka, Postgres, ClickHouse, Schema Registry, MinIO, OTel, Jaeger,
# Grafana, Prometheus) stays on docker-compose. In-cluster workloads reach
# it via host.docker.internal, which Docker Desktop exposes to kind nodes
# by default.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dream-mobility
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
