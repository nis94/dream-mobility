# Local development stack for the Dream Mobility project.
# All services run on a single bridge network. `make up` waits for healthy
# state; `make down-v` wipes volumes.
#
# DEV-ONLY ENVIRONMENT — all credentials below (minioadmin/minioadmin,
# postgres/postgres, ClickHouse no-password, no TLS, anonymous MinIO reads)
# are acceptable for local development only. Do NOT promote this file to
# staging or production without the delta documented in the infra review.
#
# Port allocation (host -> container):
#   29092 -> 9092   Kafka (PLAINTEXT_HOST listener for client tools)
#   8081  -> 8081   Confluent Schema Registry
#   5432  -> 5432   Postgres
#   8123  -> 8123   ClickHouse HTTP
#   9000  -> 9000   ClickHouse native protocol
#   9100  -> 9000   MinIO S3 API
#   9101  -> 9001   MinIO console
#   8181  -> 8181   Apache Iceberg REST catalog
#   8088  -> 8080   Kafka UI

name: dream-mobility

x-healthcheck-defaults: &hc-defaults
  interval: 5s
  timeout: 5s
  retries: 30
  start_period: 10s

services:

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode -- no Zookeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    container_name: dm-kafka
    environment:
      # KRaft: this single node plays both roles
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      # Listeners (all plaintext: DEV-ONLY — prod uses SASL/TLS):
      #   PLAINTEXT       -- intra-cluster + service-to-service inside the docker network
      #   CONTROLLER      -- KRaft control plane
      #   PLAINTEXT_HOST  -- exposed to host on 29092 for kcat/CLI tools
      #   PLAINTEXT_KIND  -- exposed on 39092 for kind pods that resolve
      #                      host.docker.internal. A third listener is
      #                      needed because one listener can only advertise
      #                      one name, and the host needs 'localhost' while
      #                      kind pods need 'host.docker.internal'.
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092,PLAINTEXT_KIND://0.0.0.0:39092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092,PLAINTEXT_KIND://host.docker.internal:39092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_KIND:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # Single-node defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Auto-create disabled: kafka-init is the authoritative topic owner.
      # A producer hitting an unknown topic should fail loudly, not silently
      # create a 1-partition topic that breaks per-entity ordering.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 168
      # Stable cluster id (base64-encoded UUID); pinning it keeps volumes reusable across restarts.
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qg'
    ports:
      # Prefix every host binding with 127.0.0.1 so dev containers aren't
      # reachable from the LAN (coffee-shop WiFi, conference network, etc.).
      # kind pods still reach the Mac loopback via host.docker.internal,
      # which Docker Desktop resolves to the Mac's loopback interface.
      - "127.0.0.1:29092:29092"
      - "127.0.0.1:39092:39092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]

  # ---------------------------------------------------------------------------
  # Kafka bootstrap -- creates the `movement.events` topic, then exits.
  # The authoritative topic owner now that KAFKA_AUTO_CREATE_TOPICS_ENABLE is
  # disabled. Partitions = 3: producer keys by entity_type:entity_id with the
  # Murmur2 balancer, so 3 partitions give per-entity ordering plus
  # parallelism for local dev.
  #
  # TODO: when the ingest-api gains a compose service entry, it MUST add
  #   depends_on:
  #     kafka-init:
  #       condition: service_completed_successfully
  # Otherwise the producer can race kafka-init and hit "unknown topic".
  # ---------------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dm-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c '
      set -e
      kafka-topics --bootstrap-server kafka:9092 \
        --create --if-not-exists \
        --topic movement.events \
        --partitions 3 \
        --replication-factor 1
      echo "Kafka bootstrap done."
      '
    restart: "no"

  # ---------------------------------------------------------------------------
  # Confluent Schema Registry (Avro contract enforcement)
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    hostname: schema-registry
    container_name: dm-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: backward
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]

  # ---------------------------------------------------------------------------
  # Kafka UI (Provectus) -- optional, helpful for poking topics during dev
  # ---------------------------------------------------------------------------
  kafka-ui:
    # Digest-pinned for reproducibility. Replace with a semver tag once the
    # project publishes one we want to track (e.g. provectuslabs/kafka-ui:v1.x).
    image: provectuslabs/kafka-ui@sha256:8f2ff02d64b0a7a2b71b6b3b3148b85f66d00ec20ad40c30bdcd415d46d31818
    container_name: dm-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      # Also gates `docker compose up --wait` on kafka-init's successful exit,
      # so `make up` reports failure if topic creation fails.
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_CLUSTERS_0_NAME: dream-mobility
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: 'true'
    ports:
      - "127.0.0.1:8088:8080"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]

  # ---------------------------------------------------------------------------
  # Postgres -- hot state (raw_events dedupe, entity_positions last-known-pos)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: dm-postgres
    environment:
      # DEV-ONLY credentials.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mobility
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "pg_isready -U postgres -d mobility"]

  # ---------------------------------------------------------------------------
  # ClickHouse -- analytical store (raw_events + materialized rollups)
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    hostname: clickhouse
    container_name: dm-clickhouse
    environment:
      CLICKHOUSE_DB: mobility
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8123/ping | grep -q Ok"]

  # ---------------------------------------------------------------------------
  # MinIO -- S3-compatible object store; backs the Iceberg lake
  # Host port 9100 (API) chosen to avoid clash with ClickHouse native (9000).
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    hostname: minio
    container_name: dm-minio
    command: server /data --console-address ":9001"
    environment:
      # DEV-ONLY credentials.
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]

  # ---------------------------------------------------------------------------
  # MinIO bootstrap -- creates the `lake` bucket for Iceberg, then exits
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: dm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      # Set MINIO_ANONYMOUS=1 only for local ad-hoc poking (public read on
      # lake/). Default is OFF so accidentally reusing this compose file in a
      # shared environment doesn't expose the bucket.
      MINIO_ANONYMOUS: "${MINIO_ANONYMOUS:-0}"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/lake || true &&
      if [ \"$$MINIO_ANONYMOUS\" = \"1\" ]; then
        mc anonymous set download local/lake || true ;
        echo 'MinIO bootstrap: anonymous download ENABLED on lake/' ;
      else
        echo 'MinIO bootstrap done (bucket private; set MINIO_ANONYMOUS=1 to enable anon read).' ;
      fi
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # Apache Iceberg REST catalog -- serves table metadata over HTTP, backed by MinIO
  # ---------------------------------------------------------------------------
  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    hostname: iceberg-rest
    container_name: dm-iceberg-rest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://lake/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: 'true'
    ports:
      - "127.0.0.1:8181:8181"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8181"]

volumes:
  kafka-data:
  postgres-data:
  clickhouse-data:
  minio-data:
