# Observability stack — run alongside the main docker-compose.yml.
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/observability/docker-compose.observability.yml up -d
#
# Adds: OTel Collector, Jaeger (trace viewer), Prometheus, Grafana.

name: dream-mobility

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: dm-otel-collector
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"   # OTLP/HTTP receiver
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: dm-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP/gRPC (used by collector)

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: dm-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: dm-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
