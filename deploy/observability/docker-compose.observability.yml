# Observability stack — run alongside the main docker-compose.yml.
# Usage:
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/observability/docker-compose.observability.yml up -d
#
# Adds: OTel Collector, Prometheus, Grafana.
# (Jaeger removed — see otel-collector.yaml header for restoration notes.)
#
# DEV-ONLY stack. No credentials are protected. Do not expose these ports
# on any shared network without a reverse proxy + auth in front.

name: dream-flight

x-healthcheck-defaults: &hc-defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 10s

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: df-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      # Bind to loopback only — same-LAN attackers shouldn't be able to
      # inject OTel traffic into the dev collector.
      - "127.0.0.1:4318:4318"    # OTLP/HTTP receiver
      - "127.0.0.1:13133:13133"  # health_check extension
    # No healthcheck: the otel-collector-contrib image is distroless (no
    # wget/curl/shell), so any CMD-based probe fails. The collector crash-
    # loops loudly on a real error, which is the practical signal here.

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: df-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: df-grafana
    environment:
      # DEV-ONLY anonymous access with Viewer role. Do NOT promote Admin
      # — earlier revisions did and that grants dashboard / data-source
      # mutation to anyone on the LAN with :3000 reachable.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      # Datasources + dashboards provisioned from the repo. Any
      # `deploy/grafana/provisioning/dashboards/**/*.json` is loaded at
      # startup and re-read every `updateIntervalSeconds` (10s). Wipe
      # `grafana-data` and restart — the setup comes back from Git.
      #
      # Relative paths in compose are resolved against the first `-f`
      # file's directory (`deploy/`), not this overlay's directory —
      # hence `./grafana/...`, not `../grafana/...`.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]

volumes:
  grafana-data:
