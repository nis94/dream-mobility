# Prometheus scrape config for local development.
# Each Go service binds its own Prometheus /metrics port (configured via
# PROM_PORT env). In local dev the services run on the host, so we scrape
# via host.docker.internal. In k8s, switch to ServiceMonitor / PodMonitor.
#
# Per-service port allocation must match the services' PROM_PORT env:
#   ingest-api        → 9464
#   query-api         → 9465
#   stream-processor  → 9466
#   clickhouse-sink   → 9467

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ingest-api"
    static_configs:
      - targets: ["host.docker.internal:9464"]
    metrics_path: /metrics

  - job_name: "query-api"
    static_configs:
      - targets: ["host.docker.internal:9465"]
    metrics_path: /metrics

  - job_name: "stream-processor"
    static_configs:
      # Only one target: the canonical PROM_PORT. Earlier revisions listed
      # 9476/9486 for ad-hoc extra host-side replicas, but that created
      # permanent `up==0` phantoms whenever those replicas weren't running.
      # In kind all pods scrape through `/metrics` on 9466, reached via the
      # kube service (future: use a PodMonitor with label selector).
      - targets:
          - "host.docker.internal:9466"
    metrics_path: /metrics

  - job_name: "clickhouse-sink"
    static_configs:
      - targets: ["host.docker.internal:9467"]
    metrics_path: /metrics
