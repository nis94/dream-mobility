# OpenTelemetry Collector configuration for local development.
# Receives OTLP/HTTP traces on :4318, exports to the debug exporter
# (stdout). Visible via `docker logs df-otel-collector`. To restore a
# trace UI, add a Tempo or Jaeger exporter here and re-add it to the
# pipeline below.
# Service metrics are scraped directly by Prometheus from the services'
# /metrics endpoints — this collector does not have a metrics pipeline.

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
